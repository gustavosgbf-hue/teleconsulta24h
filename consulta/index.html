document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

on>\n        <button class=\"mtab\" id=\"moTabCard\" onclick=\"moMetodo('cartao')\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"margin-bottom:3px\"><rect x=\"1\" y=\"4\" width=\"22\" height=\"16\" rx=\"2\" ry=\"2\"><\u002Frect><line x1=\"1\" y1=\"10\" x2=\"23\" y2=\"10\"><\u002Fline><\u002Fsvg><br>Cartão<br><span style=\"font-size:.67rem;font-weight:400;opacity:.8\">Visa · Master · Elo<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"mcard-fields\" id=\"moCardFields\">\n        <div><label class=\"ml\">Nome completo<\u002Flabel><input class=\"mi\" id=\"moPayNome\" type=\"text\" placeholder=\"Como no CPF\" autocomplete=\"name\"><\u002Fdiv>\n        <div><label class=\"ml\">CPF do pagador<\u002Flabel><input class=\"mi\" id=\"moPayCPF\" type=\"text\" placeholder=\"000.000.000-00\" inputmode=\"numeric\" maxlength=\"14\" oninput=\"moMascaraCPF(this)\"><\u002Fdiv>\n        <div><label class=\"ml\">E-mail<\u002Flabel><input class=\"mi\" id=\"moCardEmail\" type=\"email\" placeholder=\"seu@email.com\" inputmode=\"email\"><\u002Fdiv>\n        <div><label class=\"ml\">Número do cartão<\u002Flabel><input class=\"mi\" id=\"moCfNumero\" type=\"text\" placeholder=\"0000 0000 0000 0000\" inputmode=\"numeric\" maxlength=\"19\" oninput=\"moCfMascaraNumero(this)\"><\u002Fdiv>\n        <div><label class=\"ml\">Nome no cartão<\u002Flabel><input class=\"mi\" id=\"moCfNome\" type=\"text\" placeholder=\"Como aparece no cartão\" autocomplete=\"cc-name\" oninput=\"this.value=this.value.toUpperCase()\"><\u002Fdiv>\n        <div class=\"mcf-row\">\n          <div><label class=\"ml\">Validade<\u002Flabel><input class=\"mi\" id=\"moCfValidade\" type=\"text\" placeholder=\"MM/AAAA\" inputmode=\"numeric\" maxlength=\"7\" oninput=\"moCfMascaraValidade(this)\"><\u002Fdiv>\n          <div><label class=\"ml\">CVV<\u002Flabel><input class=\"mi\" id=\"moCfCvv\" type=\"text\" placeholder=\"123\" inputmode=\"numeric\" maxlength=\"4\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"mcard-err\" id=\"moCardErr\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mpix-alert\" id=\"moPixAlert\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"vertical-align:middle;margin-right:3px;color:var(--g2)\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg> O pagamento aparece como <strong style=\"color:rgba(94,224,160,.9)\">JG FONSECA SERVIÇOS MÉDICOS LTDA<\u002Fstrong>, razão social da ConsultaJá24h, empresa médica registrada.<\u002Fdiv>\n      <div id=\"moPixCpfWrap\" style=\"display:none\">\n        <label class=\"ml\">CPF do pagador<\u002Flabel>\n        <input class=\"mi\" id=\"moPixCPF\" type=\"text\" placeholder=\"000.000.000-00\" inputmode=\"numeric\" maxlength=\"14\" oninput=\"moMascaraCPF(this);moPixCpfDetectar(this)\">\n        <div style=\"font-size:.63rem;color:rgba(255,255,255,.28);margin-top:4px\">Necessário para emissão dos seus documentos <\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"mcta\" id=\"moBtnPagar\" onclick=\"moPagar()\">Gerar PIX e iniciar atendimento →<\u002Fbutton>\n      <div style=\"text-align:center;font-size:.68rem;color:rgba(255,255,255,.28)\">Após o pagamento, um médico assume seu caso em até 5 minutos.<\u002Fdiv>\n      <div class=\"mqr-wrap\" id=\"moQrWrap\">\n        <div style=\"font-size:.82rem;font-weight:600;color:rgba(255,255,255,.88);margin-bottom:4px\">Escaneie ou use Pix Copia e Cola<\u002Fdiv>\n        <img class=\"mqr-img\" id=\"moQrImg\" alt=\"QR Code PIX\">\n        <div class=\"mcopy-row\">\n          <input class=\"mcopy-input\" id=\"moPixChave\" readonly=\"\" type=\"text\" onclick=\"this.select();moCopiarPix()\">\n          <button class=\"mcopy-btn\" id=\"moCopyBtn\" onclick=\"moCopiarPix()\">Copiar<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:.66rem;color:rgba(255,255,255,.26);text-align:center;margin-top:5px;line-height:1.6\"><strong style=\"color:rgba(255,255,255,.38)\">JG FONSECA SERVICOS MEDICOS LTDA<\u002Fstrong><br>Razão social da ConsultaJá24h · Válido por 30 min<\u002Fdiv>\n        <div class=\"mstatus\" id=\"moPixStatus\">⏳ Aguardando confirmação do pagamento...<\u002Fdiv>\n        <div class=\"mja-wrap\" id=\"moJaWrap\">\n          <button onclick=\"moVerificarManual()\" id=\"moJaBtn\" style=\"padding:10px 20px;border-radius:11px;border:1px solid rgba(180,224,90,.25);background:rgba(180,224,90,.06);color:#b4e05a;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;width:100%\">✓ Já paguei, verificar agora<\u002Fbutton>\n          <div style=\"font-size:.63rem;color:rgba(255,255,255,.2);margin-top:4px\">Clique se o pagamento foi debitado e a tela não avançou<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;margin-top:8px\">\n          <button onclick=\"moReiniciar()\" style=\"background:none;border:none;color:rgba(255,255,255,.18);font-family:'Outfit',sans-serif;font-size:.68rem;cursor:pointer;text-decoration:underline\">← recomeçar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mtrust\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"vertical-align:middle;margin-right:3px;color:var(--g2)\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg> Pagamento seguro · CNPJ verificado · PIX via PagBank · Cartão via Efí<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STEP 3: CPF pós-pagamento -->\n    <div class=\"mo-step\" id=\"moStep3\">\n      <div class=\"mconf-icon\" style=\"margin:0 auto 4px\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"color:var(--g2)\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:500;text-align:center;margin-bottom:2px\">Pagamento confirmado!<\u002Fdiv>\n      <p style=\"font-size:.8rem;color:rgba(255,255,255,.45);font-weight:300;line-height:1.6;text-align:center;margin-bottom:10px\">Precisamos de mais alguns dados para emitir receita e atestado.<\u002Fp>\n      <div id=\"moPosNomeWrap\">\n        <label class=\"ml\">Nome completo<\u002Flabel>\n        <input class=\"mi\" id=\"moCpfPosNome\" type=\"text\" placeholder=\"Seu nome completo\" autocomplete=\"name\" onkeydown=\"if(event.key==='Enter')document.getElementById('moCpfPosNasc').focus()\">\n      <\u002Fdiv>\n      <div id=\"moPosNascWrap\">\n        <label class=\"ml\">Data de nascimento<\u002Flabel>\n        <input class=\"mi\" id=\"moCpfPosNasc\" type=\"text\" placeholder=\"DD/MM/AAAA\" inputmode=\"numeric\" maxlength=\"10\" oninput=\"moMascaraNasc(this)\" onkeydown=\"if(event.key==='Enter')document.getElementById('moCpfPos').focus()\">\n      <\u002Fdiv>\n      <div>\n        <label class=\"ml\">CPF<\u002Flabel>\n        <input class=\"mi\" id=\"moCpfPos\" type=\"text\" placeholder=\"000.000.000-00\" inputmode=\"numeric\" maxlength=\"14\" oninput=\"moMascaraCPF(this)\" onkeydown=\"if(event.key==='Enter')moIniciarTriagem()\">\n        <div style=\"font-size:.66rem;color:rgba(255,255,255,.42);margin-top:5px;line-height:1.5\">\n          Necessário para receita, atestado e prontuário. Protegidos por sigilo médico e LGPD.\n        <\u002Fdiv>\n        <div class=\"mcard-err\" id=\"moCpfPosErr\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"mcta\" id=\"moBtnTriagem\" onclick=\"moIniciarTriagem()\">Iniciar atendimento →<\u002Fbutton>\n      <div style=\"text-align:center;margin-top:6px\">\n        <div style=\"display:flex;gap:5px;align-items:center;justify-content:center\">\n          <div style=\"width:6px;height:6px;border-radius:50%;background:#5ee0a0;animation:pulse 1.4s ease-in-out infinite\"><\u002Fdiv>\n          <div style=\"width:6px;height:6px;border-radius:50%;background:#5ee0a0;animation:pulse 1.4s ease-in-out infinite .2s\"><\u002Fdiv>\n          <div style=\"width:6px;height:6px;border-radius:50%;background:#5ee0a0;animation:pulse 1.4s ease-in-out infinite .4s\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:.66rem;color:rgba(255,255,255,.28);margin-top:5px\">Médico aguardando sua triagem<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nvar MO_API='https://triagem-api.onrender.com';\nvar moTelVal='',moNomeVal='',moNascVal='',moCPFVal='',moEmailVal='';\nvar moAtendimentoId=null,moOrderId=null,moMetodoAtual='pix';\nvar moPoller=null,moJaTimer=null,moCardProcessando=false;\nvar moTipoConsulta='chat'; // 'chat' ou 'video'\nvar EFI_PAYEE_CODE='b241c1c1aa59c7a663f8360ac1d05b52';\n\n// contexto pré-selecionado do pain-grid\nvar moPreContexto = '';\n\nfunction moAbrir(contexto){\n  moPreContexto = contexto || '';\n  document.getElementById('moOverlay').classList.add('open');\n  document.body.style.overflow='hidden';\n  // Google Ads: begin_checkout — abriu o modal\n  if(typeof gtag==='function'){gtag('event','begin_checkout',{currency:'BRL',value:49.90});}\n  if(window.dataLayer){window.dataLayer.push({event:'begin_checkout',value:49.90,currency:'BRL'});}\n  // Pula step 0 (escolha chat/vídeo) — chat fica como default; vídeo pode ser oferecido depois\n  moTipoConsulta = 'chat';\n  moIrStep(1);\n  setTimeout(function(){ var el=document.getElementById('moTel'); if(el) el.focus(); },300);\n}\n\nfunction moSelecionarTipo(tipo){\n  moTipoConsulta=tipo;\n  document.getElementById('moBtnChat').classList.toggle('selected', tipo==='chat');\n  document.getElementById('moBtnVideo').classList.toggle('selected', tipo==='video');\n}\n\nfunction moAvancarStep0(){\n  moIrStep(1);\n  setTimeout(function(){ var el=document.getElementById('moTel'); if(el) el.focus(); },200);\n}\nfunction moFechar(){\n  if(moPoller){ clearInterval(moPoller); moPoller=null; }\n  if(moJaTimer){ clearTimeout(moJaTimer); moJaTimer=null; }\n  document.getElementById('moOverlay').classList.remove('open');\n  document.body.style.overflow='';\n}\ndocument.getElementById('moOverlay').addEventListener('click',function(e){ if(e.target===this) moFechar(); });\n\nfunction moIrStep(n){\n  document.querySelectorAll('.mo-step').forEach(function(s){ s.classList.remove('on'); });\n  document.getElementById('moStep'+n).classList.add('on');\n  document.getElementById('moBox').scrollTop=0;\n  var titles={0:'Como prefere ser atendido?',1:'Iniciar atendimento',2:'Pagamento',3:'Confirmado'};\n  document.getElementById('moTitle').textContent=titles[n]||'';\n  var x=document.querySelector('.mo-x');\n  if(x) x.style.display=n===3?'none':'';\n}\n\nfunction moMascaraTel(el){\n  var v=el.value.replace(/\\D/g,'').slice(0,11);\n  if(v.length>2) v='('+v.slice(0,2)+') '+v.slice(2);\n  if(v.length>10) v=v.slice(0,10)+'-'+v.slice(10);\n  el.value=v;\n  var d=el.value.replace(/\\D/g,'');\n  document.getElementById('moFbTel').classList.toggle('show',d.length>=10&&d.length<=11);\n}\nfunction moMascaraNasc(el){\n  var v=el.value.replace(/\\D/g,'').slice(0,8);\n  if(v.length>4) v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);\n  else if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2);\n  el.value=v;\n}\nfunction moMascaraCPF(el){\n  var v=el.value.replace(/\\D/g,'').slice(0,11);\n  if(v.length>9) v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);\n  else if(v.length>6) v=v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);\n  else if(v.length>3) v=v.slice(0,3)+'.'+v.slice(3);\n  el.value=v;\n}\n\n// ─── VALIDAÇÃO CPF ───────────────────────────────────────────────────────────\nfunction validarCPF(cpf){\n  cpf = cpf.replace(/\\D/g,'');\n  if(cpf.length!==11 || /^(\\d)\\1{10}$/.test(cpf)) return false;\n  var s=0, r;\n  for(var i=0;i<9;i++) s+=parseInt(cpf[i])*(10-i);\n  r=(s*10)%11; if(r===10) r=0;\n  if(r!==parseInt(cpf[9])) return false;\n  s=0;\n  for(var i=0;i<10;i++) s+=parseInt(cpf[i])*(11-i);\n  r=(s*10)%11; if(r===10) r=0;\n  return r===parseInt(cpf[10]);\n}\n\nfunction moCfMascaraNumero(el){\n  var v=el.value.replace(/\\D/g,'').slice(0,16);\n  el.value=v.replace(/(.{4})/g,'$1 ').trim();\n}\nfunction moCfMascaraValidade(el){\n  var v=el.value.replace(/\\D/g,'').slice(0,6);\n  if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2);\n  el.value=v;\n}\nfunction moConverterNasc(val){\n  if(!val||val.length!==10) return val||'';\n  var p=val.split('/');\n  if(p.length!==3) return val;\n  return p[2]+'-'+p[1]+'-'+p[0];\n}\n\nasync function moAvancarStep1(){\n  var telEl=document.getElementById('moTel');\n  var tel=telEl.value.replace(/\\D/g,'');\n  if(tel.length>11&&tel.startsWith('55')) tel=tel.slice(2);\n  if(!tel||tel.length<10){\n    telEl.focus(); telEl.style.borderColor='rgba(255,95,87,.5)';\n    setTimeout(function(){ telEl.style.borderColor=''; },1500); return;\n  }\n  moTelVal=tel;\n  var btn=document.getElementById('moBtnStep1');\n  btn.disabled=true; btn.textContent='Verificando...';\n  var autofill=document.getElementById('moAutofill');\n  try {\n    var res=await fetch(MO_API+'/api/paciente/buscar?tel='+encodeURIComponent(tel));\n    var data=await res.json();\n    if(data.ok&&data.paciente&&data.paciente.nome&&data.paciente.nome.trim().split(/\\s+/).length>=2){\n      var p=data.paciente;\n      moNomeVal=p.nome; moNascVal=p.data_nascimento||'';\n      autofill.textContent='Cadastro encontrado. Continuando...';\n      autofill.className='mautofill show';\n      fetch(MO_API+'/api/identify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:moNomeVal,tel:moTelVal})}).catch(function(){});\n      fetch(MO_API+'/api/consent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:moNomeVal,tel:moTelVal,versao:'termos-v1.0'})}).catch(function(){});\n      setTimeout(function(){ btn.disabled=false; btn.textContent='Continuar'; moIrPagamento(); },700);\n      return;\n    } else {\n      autofill.textContent='Número novo. Informe seu nome para continuar.';\n      autofill.className='mautofill show';\n    }\n  } catch(e) {\n    autofill.textContent='Não foi possível verificar. Informe seu nome abaixo.';\n    autofill.className='mautofill show';\n  }\n  document.getElementById('moNomeWrap').style.display='block';\n  document.getElementById('moNascWrap').style.display='block';\n  document.getElementById('moNome').focus();\n  btn.disabled=false; btn.textContent='Continuar';\n  btn.onclick=moConfirmarComNome;\n}\n\nfunction moConfirmarComNome(){\n  var nomeEl=document.getElementById('moNome');\n  var nome=nomeEl.value.trim();\n  if(!nome){ nomeEl.focus(); return; }\n  if(nome.split(/\\s+/).length<2){\n    nomeEl.style.borderColor='rgba(255,95,87,.5)';\n    setTimeout(function(){ nomeEl.style.borderColor=''; },1500); return;\n  }\n  moNomeVal=nome;\n  moNascVal=moConverterNasc(document.getElementById('moNasc').value);\n  fetch(MO_API+'/api/identify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:moNomeVal,tel:moTelVal})}).catch(function(){});\n  fetch(MO_API+'/api/consent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:moNomeVal,tel:moTelVal,versao:'termos-v1.0'})}).catch(function(){});\n  moIrPagamento();\n}\n\nasync function moIrPagamento(){\n  var btn=document.getElementById('moBtnStep1');\n  btn.disabled=true; btn.textContent='Preparando...';\n  try {\n    var res=await fetch(MO_API+'/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({nome:moNomeVal,tel:moTelVal,cpf:moCPFVal,triagem:'(aguardando pagamento)',tipo:moTipoConsulta,data_nascimento:moNascVal||''})});\n    var data=await res.json();\n    if(data.ok&&data.atendimentoId) moAtendimentoId=data.atendimentoId;\n  } catch(e){ console.warn('[MO] notify falhou, continua sem ID'); }\n  btn.disabled=false; btn.textContent='Continuar';\n  btn.onclick=moAvancarStep1;\n  moMetodo('pix');\n  moIrStep(2);\n}\n\nfunction moTextoBotaoPagamento(){\n  return moMetodoAtual==='cartao'\n    ? 'Pagar no cartão e iniciar atendimento →'\n    : 'Gerar PIX e iniciar atendimento →';\n}\n\nfunction moMetodo(m){\n  moMetodoAtual=m;\n  document.getElementById('moTabPix').className='mtab'+(m==='pix'?' pix':'');\n  document.getElementById('moTabCard').className='mtab'+(m==='cartao'?' card':'');\n  document.getElementById('moCardFields').className='mcard-fields'+(m==='cartao'?' show':'');\n  document.getElementById('moPixAlert').style.display=m==='pix'?'block':'none';\n  document.getElementById('moPixCpfWrap').style.display='none';\n  document.getElementById('moQrWrap').classList.remove('show');\n  var btn=document.getElementById('moBtnPagar');\n  btn.style.display='block'; btn.textContent=moTextoBotaoPagamento(); btn.disabled=false;\n}\n\nfunction moPixCpfDetectar(el){\n  var cpf=el.value.replace(/\\D/g,'');\n  var statusEl=document.getElementById('moPixStatus');\n  if(cpf.length===11){\n    if(!validarCPF(cpf)){\n      el.style.borderColor='rgba(255,95,87,.7)';\n      setTimeout(function(){el.style.borderColor='';},2000);\n      if(statusEl){ statusEl.textContent='⚠️ CPF inválido. Verifique os números e tente novamente.'; statusEl.className='mstatus err'; statusEl.style.display='block'; }\n      return;\n    }\n    moCPFVal=cpf;\n    moGerarPix();\n  }\n}\n\nasync function moPagar(){\n  if(moMetodoAtual==='pix'){\n    if(moCPFVal && moCPFVal.length===11){\n      await moGerarPix();\n    } else {\n      var cpfWrap=document.getElementById('moPixCpfWrap');\n      cpfWrap.style.display='block';\n      document.getElementById('moBtnPagar').style.display='none';\n      setTimeout(function(){ var el=document.getElementById('moPixCPF'); if(el) el.focus(); },100);\n    }\n  } else {\n    await moPagarCartao();\n  }\n}\n\nasync function moGerarPix(){\n  // CPF coletado após pagamento, na triagem , não bloqueamos o PIX aqui\n  // Google Ads: add_payment_info\n  if(typeof gtag==='function'){gtag('event','add_payment_info',{currency:'BRL',value:49.90,payment_type:'pix'});}\n  if(window.dataLayer){window.dataLayer.push({event:'add_payment_info',value:49.90,currency:'BRL',payment_type:'pix'});}\n  var btn=document.getElementById('moBtnPagar');\n  btn.disabled=true; btn.textContent='Gerando PIX...';\n  var statusEl=document.getElementById('moPixStatus');\n  statusEl.style.display='block'; statusEl.className='mstatus';\n  statusEl.textContent='Gerando código PIX...';\n  var _reset=setTimeout(function(){\n    if(btn.disabled){ btn.disabled=false; btn.textContent='Tentar novamente';\n      statusEl.textContent='Servidor demorou. Clique novamente.'; statusEl.className='mstatus err'; }\n  },25000);\n  try {\n    if(!validarCPF(moCPFVal)){\n      var statusEl=document.getElementById('moPixStatus');\n      if(statusEl){ statusEl.textContent='⚠️ CPF inválido. Verifique os números e tente novamente.'; statusEl.className='mstatus err'; statusEl.style.display='block'; }\n      btn.disabled=false; btn.textContent='Pagar com PIX';\n      clearTimeout(_reset);\n      return;\n    }\n    var _nomeEnvio=(moNomeVal&&moNomeVal.trim().length>1)?moNomeVal.trim():'Paciente';\n    var res=await fetch(MO_API+'/api/pagbank/order',{method:'POST',headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({nome:_nomeEnvio,cpf:moCPFVal,email:undefined})});\n    var data=await res.json();\n    if(!data.ok) throw new Error(data.error||'Erro ao gerar PIX');\n    moOrderId=data.order_id;\n    var pixText=data.qr_code_text||'';\n    if(moAtendimentoId&&moOrderId){\n      fetch(MO_API+'/api/atendimento/vincular-order',{method:'POST',headers:{'Content-Type':'application/json'},\n        body:JSON.stringify({atendimentoId:moAtendimentoId,orderId:moOrderId})}).catch(function(){});\n    }\n    var img=document.getElementById('moQrImg');\n    if(pixText){\n      img.onload=function(){ img.style.display='block'; };\n      img.src='https://api.qrserver.com/v1/create-qr-code/?size=148x148&data='+encodeURIComponent(pixText);\n      document.getElementById('moPixChave').value=pixText;\n    }\n    document.getElementById('moQrWrap').classList.add('show');\n    btn.style.display='none';\n    clearTimeout(_reset);\n    statusEl.textContent='Aguardando confirmação do pagamento...';\n    statusEl.className='mstatus'; statusEl.style.display='block';\n    // [TRACKING] Dispara gerou_pix apenas 1x por order — flag evita duplicação\n    (function(){\n      var chavePixGerado = 'pix_gerado_' + (moOrderId || Date.now());\n      if(!sessionStorage.getItem(chavePixGerado)){\n        sessionStorage.setItem(chavePixGerado, '1');\n        window.dataLayer = window.dataLayer || [];\n        window.dataLayer.push({event:'gerou_pix', value:49.90, currency:'BRL'});\n        console.log('[TRACKING] gerou_pix disparado', chavePixGerado);\n      }\n    })();\n    moIniciarPolling();\n  } catch(e) {\n    clearTimeout(_reset);\n    btn.disabled=false; btn.textContent='Continuar para atendimento';\n    statusEl.textContent='Erro ao gerar PIX: '+(e.message||'Tente novamente.');\n    statusEl.className='mstatus err'; statusEl.style.display='block';\n  }\n}\n\nfunction moIniciarPolling(){\n  clearInterval(moPoller);\n  var tentativas=0;\n  moJaTimer=setTimeout(function(){ document.getElementById('moJaWrap').style.display='block'; },120000);\n  moPoller=setInterval(async function(){\n    tentativas++;\n    if(tentativas>600){ clearInterval(moPoller);\n      document.getElementById('moPixStatus').textContent='QR Code expirado. Recarregue.';\n      document.getElementById('moPixStatus').className='mstatus err'; return; }\n    if(!moOrderId) return;\n    try {\n      var r=await fetch(MO_API+'/api/pagbank/order/'+moOrderId);\n      var d=await r.json();\n      if(d.ok&&d.pago){ clearInterval(moPoller); clearTimeout(moJaTimer); moConfirmarPagamento(); }\n    } catch(e){}\n  },3000);\n}\n\nasync function moVerificarManual(){\n  var btn=document.getElementById('moJaBtn');\n  btn.disabled=true; btn.textContent='Verificando...';\n  try {\n    var r=await fetch(MO_API+'/api/pagbank/order/'+moOrderId);\n    var d=await r.json();\n    if(d.ok&&d.pago){ clearInterval(moPoller); clearTimeout(moJaTimer); moConfirmarPagamento(); return; }\n    if(moAtendimentoId){\n      var r2=await fetch(MO_API+'/api/atendimento/status/'+moAtendimentoId);\n      var d2=await r2.json();\n      if(d2.ok&&d2.atendimento&&d2.atendimento.pagamento_status==='confirmado'){\n        clearInterval(moPoller); clearTimeout(moJaTimer); moConfirmarPagamento(); return;\n      }\n    }\n    document.getElementById('moPixStatus').textContent='Pagamento ainda não identificado.';\n    btn.disabled=false; btn.textContent='Já paguei, verificar novamente';\n  } catch(e){ btn.disabled=false; btn.textContent='Já paguei, verificar novamente'; }\n}\n\nfunction dispararConversao(){\n  var txId = moAtendimentoId || moOrderId;\n  if(!txId){ setTimeout(dispararConversao, 2000); return; }\n  var chave = 'conv_' + txId;\n  if(localStorage.getItem(chave)) return;\n  localStorage.setItem(chave, '1');\n  window.dataLayer = window.dataLayer || [];\n  window.dataLayer.push({event:'pagamento_confirmado',value:49.90,currency:'BRL',transaction_id:String(txId)});\n  console.log('[TRACKING] pagamento_confirmado disparado', String(txId));\n  if(typeof gtag==='function'){\n    gtag('event','conversion',{send_to:'AW-17964942771/AT3gCPTl0PsbEL0LrfZC',value:49.90,currency:'BRL',transaction_id:String(txId)});\n  }\n}\n\nfunction moConfirmarPagamento(){\n  dispararConversao();\n  document.getElementById('moJaWrap').style.display='none';\n  document.getElementById('moPixStatus').textContent='Pagamento confirmado!';\n  document.getElementById('moPixStatus').className='mstatus ok';\n\n  // Pré-preencher Step 3 com dados já coletados\n  var nomeEl=document.getElementById('moCpfPosNome');\n  var nascEl=document.getElementById('moCpfPosNasc');\n  var nomeWrap=document.getElementById('moPosNomeWrap');\n  var nascWrap=document.getElementById('moPosNascWrap');\n  // Se nome já foi coletado (autofill ou Step 1), esconde o campo\n  if(moNomeVal){ nomeEl.value=moNomeVal; nomeWrap.style.display='none'; } else { nomeWrap.style.display='block'; }\n  // Se nascimento já foi coletado, esconde\n  if(moNascVal){ nascWrap.style.display='none'; } else { nascWrap.style.display='block'; }\n\n  // Se já temos CPF (pagamento por cartão), pula direto para a triagem\n  if(moCPFVal && moCPFVal.length===11){\n    moEnviarCpfEIr();\n  } else {\n    // PIX: vai para Step 3 para coletar CPF (e nome/nascimento se necessário)\n    moIrStep(3);\n    setTimeout(function(){\n      // Focar no primeiro campo visível\n      if(nomeWrap.style.display!=='none'){ var el=document.getElementById('moCpfPosNome'); if(el) el.focus(); }\n      else if(nascWrap.style.display!=='none'){ var el=document.getElementById('moCpfPosNasc'); if(el) el.focus(); }\n      else { var el=document.getElementById('moCpfPos'); if(el) el.focus(); }\n    },320);\n  }\n}\n\nfunction moIniciarTriagem(){\n  var errEl=document.getElementById('moCpfPosErr');\n  errEl.style.display='none';\n\n  // Coletar nome se campo visível\n  var nomeWrap=document.getElementById('moPosNomeWrap');\n  if(nomeWrap&&nomeWrap.style.display!=='none'){\n    var nomeEl=document.getElementById('moCpfPosNome');\n    var n=nomeEl.value.trim();\n    if(!n||n.split(/\\s+/).length<2){\n      errEl.textContent='Informe o nome completo (nome e sobrenome).';\n      errEl.style.display='block'; nomeEl.focus();\n      nomeEl.style.borderColor='rgba(255,95,87,.5)';\n      setTimeout(function(){ nomeEl.style.borderColor=''; },1500); return;\n    }\n    moNomeVal=n;\n  }\n\n  // Coletar nascimento se campo visível\n  var nascWrap=document.getElementById('moPosNascWrap');\n  if(nascWrap&&nascWrap.style.display!=='none'){\n    var nascEl=document.getElementById('moCpfPosNasc');\n    var nb=nascEl.value.trim();\n    if(nb&&nb.length===10) moNascVal=moConverterNasc(nb);\n  }\n\n  var cpfEl=document.getElementById('moCpfPos');\n  var cpf=cpfEl.value.replace(/\\D/g,'');\n  if(!cpf||cpf.length!==11){\n    errEl.textContent='Informe um CPF válido para continuar.';\n    errEl.style.display='block';\n    cpfEl.focus(); cpfEl.style.borderColor='rgba(255,95,87,.5)';\n    setTimeout(function(){ cpfEl.style.borderColor=''; },1500);\n    return;\n  }\n  moCPFVal=cpf;\n\n  // Atualizar nome/nascimento no registro se coletados aqui\n  if(moAtendimentoId && (moNomeVal||moNascVal)){\n    fetch(MO_API+'/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({atendimentoId:moAtendimentoId,nome:moNomeVal,tel:moTelVal,cpf:moCPFVal,data_nascimento:moNascVal||'',triagem:'(aguardando pagamento)',tipo:moTipoConsulta})}).catch(function(){});\n  }\n\n  var btn=document.getElementById('moBtnTriagem');\n  btn.disabled=true; btn.textContent='Entrando...';\n  moEnviarCpfEIr();\n}\n\nfunction moEnviarCpfEIr(){\n  // Atualiza CPF no registro (Sheets/Memed/prontuário)\n  if(moAtendimentoId && moCPFVal){\n    fetch(MO_API+'/api/atendimento/atualizar-cpf',{method:'POST',headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({atendimentoId:moAtendimentoId,cpf:moCPFVal})}).catch(function(){});\n  }\n  var url='https://consultaja24h.com.br/triagem.html';\n  var params=[];\n  if(moAtendimentoId) params.push('consulta='+moAtendimentoId);\n  params.push('tipo='+moTipoConsulta);\n  if(moCPFVal) params.push('cpf='+moCPFVal);\n  if(params.length) url+='?'+params.join('&');\n  window.location.href=url;\n}\n\nfunction moDetectarBandeira(n){\n  if(/^4/.test(n)) return 'visa';\n  if(/^5[1-5]/.test(n)) return 'mastercard';\n  if(/^3[47]/.test(n)) return 'amex';\n  if(/^(636368|438935|504175|451416|636297|5067|4576|4011)/.test(n)) return 'elo';\n  return 'visa';\n}\n\nasync function moPagarCartao(){\n  if(moCardProcessando) return;\n  var nome=document.getElementById('moPayNome').value.trim();\n  var _cpfEl=document.getElementById('moPayCPF');var cpfNum=_cpfEl?_cpfEl.value.replace(/\\D/g,''):'';\n  var email=document.getElementById('moCardEmail').value.trim();\n  var numero=document.getElementById('moCfNumero').value.replace(/\\s/g,'');\n  var nomeCF=document.getElementById('moCfNome').value.trim();\n  var valCF=document.getElementById('moCfValidade').value.trim();\n  var cvv=document.getElementById('moCfCvv').value.trim();\n  var errEl=document.getElementById('moCardErr');\n  function err(msg){ errEl.textContent=msg; errEl.style.display='block'; }\n  errEl.style.display='none';\n  if(!nome){ document.getElementById('moPayNome').focus(); return; }\n  if(!cpfNum||cpfNum.length!==11){ err('CPF inválido.'); document.getElementById('moPayCPF').focus(); return; }\n  if(!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)){ err('E-mail inválido.'); document.getElementById('moCardEmail').focus(); return; }\n  if(numero.length<13){ err('Número do cartão invalido.'); return; }\n  if(!nomeCF){ err('Informe o nome no cartão.'); return; }\n  var partes=valCF.split('/');\n  if(partes.length!==2||partes[0].length!==2||partes[1].length!==4){ err('Validade inválida. Use MM/AAAA.'); return; }\n  if(!cvv||cvv.length<3){ err('CVV inválido.'); return; }\n  moCardProcessando=true;\n  var btn=document.getElementById('moBtnPagar');\n  btn.disabled=true; btn.textContent='Processando...';\n  moNomeVal=nome; moCPFVal=cpfNum; moEmailVal=email;\n  try {\n    if(!moAtendimentoId){\n      var rPre=await fetch(MO_API+'/api/notify',{method:'POST',headers:{'Content-Type':'application/json'},\n        body:JSON.stringify({nome:nome,tel:moTelVal,cpf:cpfNum,triagem:'(aguardando pagamento)',tipo:moTipoConsulta,data_nascimento:moNascVal||''})});\n      var dPre=await rPre.json();\n      if(dPre&&dPre.atendimentoId) moAtendimentoId=dPre.atendimentoId;\n    }\n    if(typeof EfiPay==='undefined') throw new Error('SDK Efí não carregou. Verifique sua conexão.');\n    var tokenResult=await EfiPay.CreditCard\n      .setAccount(EFI_PAYEE_CODE).setEnvironment('production')\n      .setCreditCardData({brand:moDetectarBandeira(numero),number:numero,cvv:cvv,\n        expirationMonth:partes[0],expirationYear:partes[1],holderName:nomeCF,holderDocument:cpfNum,reuse:false})\n      .getPaymentToken();\n    if(!tokenResult||!tokenResult.payment_token) throw new Error('Falha ao tokenizar cartão.');\n    var r=await fetch(MO_API+'/api/efi/cartao/cobrar',{method:'POST',headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({payment_token:tokenResult.payment_token,nome:nome,cpf:cpfNum,email:email,telefone:moTelVal,parcelas:1,atendimentoId:moAtendimentoId||undefined})});\n    var d=await r.json();\n    var ok=!!(d&&(d.ok===true||d.status==='approved'||d.status==='paid'||d.transaction_id||d.transactionId));\n    if(ok){ moConfirmarPagamento(); }\n    else throw new Error(d.error||'Cartão não aprovado. Verifique os dados ou tente outro cartão.');\n  } catch(e) {\n    document.getElementById('moCardErr').textContent=e.message||'Erro ao processar. Tente novamente.';\n    document.getElementById('moCardErr').style.display='block';\n  } finally {\n    moCardProcessando=false; btn.disabled=false; btn.textContent='Continuar para atendimento';\n  }\n}\n\nfunction moCopiarPix(){\n  var chave=document.getElementById('moPixChave').value;\n  if(!chave) return;\n  var btn=document.getElementById('moCopyBtn'); var prev=btn.textContent;\n  function ok(){ btn.textContent='Copiado!'; setTimeout(function(){ btn.textContent=prev; },2000); }\n  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(chave).then(ok).catch(function(){ moFallbackCopy(chave); ok(); });\n  else { moFallbackCopy(chave); ok(); }\n}\nfunction moFallbackCopy(text){\n  var el=document.createElement('textarea'); el.value=text; el.style.position='fixed'; el.style.opacity='0';\n  document.body.appendChild(el); el.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(el);\n}\n\nfunction moReiniciar(){\n  clearInterval(moPoller); clearTimeout(moJaTimer);\n  moPoller=null; moJaTimer=null; moOrderId=null; moAtendimentoId=null;\n  moTelVal=''; moNomeVal=''; moNascVal=''; moCPFVal=''; moEmailVal=''; moCardProcessando=false;\n  ['moTel','moNome','moNasc','moPayNome','moPayCPF','moCardEmail','moCfNumero','moCfNome','moCfValidade','moCfCvv','moPixCPF','moCpfPos','moCpfPosNome','moCpfPosNasc'].forEach(function(id){\n    var el=document.getElementById(id); if(el) el.value='';\n  });\n  document.getElementById('moFbTel').classList.remove('show');\n  document.getElementById('moNomeWrap').style.display='none';\n  document.getElementById('moNascWrap').style.display='none';\n  document.getElementById('moAutofill').className='mautofill';\n  document.getElementById('moAutofill').textContent='';\n  document.getElementById('moQrWrap').classList.remove('show');\n  document.getElementById('moPixCpfWrap').style.display='none';\n  var qrImg=document.getElementById('moQrImg'); if(qrImg){qrImg.src='';qrImg.style.display='none';}\n  document.getElementById('moJaWrap').style.display='none';\n  document.getElementById('moPixStatus').style.display='none';\n  document.getElementById('moCardErr').style.display='none';\n  var btn=document.getElementById('moBtnStep1');\n  btn.disabled=false; btn.textContent='Continuar'; btn.onclick=moAvancarStep1;\n  moTipoConsulta='chat';\n  moSelecionarTipo('chat');\n  moIrStep(0);\n}\n\ndocument.addEventListener('DOMContentLoaded',function(){\n  document.querySelectorAll('a[href*=\"triagem.html\"],.btn-primary,.sticky-cta a').forEach(function(el){\n    el.addEventListener('click',function(e){ e.preventDefault(); e.stopPropagation(); moAbrir(); });\n  });\n\n  // Contador de médicos online no CTA final (varia entre 2 e 5 para parecer real)\n  var onlineEl = document.getElementById('ctaFinalOnline');\n  if(onlineEl){\n    var n = Math.floor(Math.random()*4)+2; // 2–5\n    onlineEl.textContent = n + ' médico' + (n>1?'s':'') + ' online agora';\n  }\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
